name: Cost Janitor

on: [push]

jobs:
  run-janitor:
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack
        ports:
          - 4566:4566

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install boto3

      - name: Wait for LocalStack
        run: sleep 20

      - name: Run Janitor Script
        run: python janitor/janitor.py

      - name: Run delete mode
        run: python janitor/janitor.py --delete
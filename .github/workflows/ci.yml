name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  format-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r janitor/requirements.txt
          pip install black flake8

      - name: Check formatting
        run: black --check .

      - name: Lint
        run: flake8 .

  smoke:
    runs-on: ubuntu-latest
    needs: format-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r janitor/requirements.txt

      - name: Run janitor help
        run: python -m janitor.janitor --help
